services:
  api:
    build: .
    container_name: kotoba_pro_api
    volumes:
      - kotoba_data:/app/data
    expose:
      - "8000"
  nginx:
    image: nginx:1.27-alpine
    container_name: kotoba_pro_nginx
    ports:
      - "8080:80"
    volumes:
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
volumes:
  kotoba_data:
